<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Viewer - YummyAnime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #e53935;
            --primary-dark: #b71c1c;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-hover: #252525;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
            --accent-gold: #ffb300;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            background: rgba(15, 15, 15, 0.95);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo:hover {
            color: var(--primary-dark);
        }

        nav {
            display: flex;
            gap: 35px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s;
            cursor: pointer;
            padding: 8px 0;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-color);
            transition: width 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--text-primary);
        }

        nav a.active::after {
            width: 100%;
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            width: 280px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.1);
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        .search-bar button {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            background: var(--primary-color);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
        }

        .search-bar button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        main {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }

        .anime-card {
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .anime-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border-color: var(--border-color);
        }

        .anime-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
        }

        .anime-card-info {
            padding: 14px;
        }

        .anime-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .anime-card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .rating {
            color: var(--accent-gold);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filters select {
            padding: 10px 18px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            min-width: 150px;
        }

        .filters select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--bg-card);
            margin: 40px auto;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .modal-header {
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: var(--text-primary);
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .modal-close:hover {
            background: var(--primary-color);
        }

        .modal-poster {
            width: 100%;
            height: 450px;
            object-fit: cover;
            display: block;
        }

        .modal-body {
            padding: 35px;
        }

        .modal-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .modal-meta {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .modal-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .modal-description {
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 15px;
        }

        .modal-genres {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .genre-tag {
            background: rgba(229, 57, 53, 0.15);
            color: var(--primary-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(229, 57, 53, 0.3);
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            margin-top: 25px;
            overflow: hidden;
        }
        
        .video-player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-title {
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .episode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .episode-btn {
            padding: 10px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 14px;
        }
        
        .episode-btn:hover {
            border-color: var(--primary-color);
            color: var(--text-primary);
        }

        .episode-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--text-primary);
        }

        /* Страница просмотра */
        #watchPage {
            min-height: 100vh;
            padding: 40px;
        }

        .watch-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 30px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--text-primary);
        }

        .watch-header {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            align-items: flex-start;
        }

        .watch-poster {
            width: 280px;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .watch-info {
            flex: 1;
        }

        .watch-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .watch-meta {
            display: flex;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .watch-genres {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .player-section {
            margin-bottom: 40px;
        }

        .main-video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .main-video-player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .description-section, .related-section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .section-subtitle {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-subtitle::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        .watch-description {
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 15px;
        }

        .related-episodes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .related-episode-card {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .related-episode-card:hover {
            border-color: var(--primary-color);
            background: var(--bg-hover);
        }

        .related-episode-card.active {
            border-color: var(--primary-color);
            background: rgba(229, 57, 53, 0.1);
        }

        .related-episode-number {
            background: var(--primary-color);
            color: var(--text-primary);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .related-episode-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .related-episode-dubbing {
            font-size: 12px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            nav {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .search-bar input {
                width: 200px;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 16px;
            }

            .anime-card img {
                height: 200px;
            }

            .watch-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .watch-poster {
                width: 200px;
                height: 280px;
            }

            .watch-meta {
                justify-content: center;
            }

            .watch-genres {
                justify-content: center;
            }

            .watch-title {
                font-size: 24px;
            }

            #watchPage {
                padding: 20px;
            }

            .related-episodes {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo" onclick="loadHome(); return false;">🎬 AnimeViewer</a>
        <nav>
            <a href="#" class="active" onclick="loadHome(); return false;">Главная</a>
            <a href="#" onclick="loadCatalog(); return false;">Каталог</a>
            <a href="#" onclick="loadSchedule(); return false;">Расписание</a>
            <a href="#" onclick="loadVideos(); return false;">Видео</a>
        </nav>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Поиск аниме...">
            <button onclick="searchAnime()">Найти</button>
        </div>
    </header>

    <main id="mainContent">
        <div class="loading">Загрузка...</div>
    </main>

    <!-- Страница просмотра аниме -->
    <div id="watchPage" style="display: none;">
        <div class="watch-container">
            <button class="back-btn" onclick="goBack()">← Назад</button>
            <div class="watch-header">
                <img id="watchPoster" class="watch-poster" src="" alt="">
                <div class="watch-info">
                    <h1 id="watchTitle" class="watch-title"></h1>
                    <div class="watch-meta">
                        <span class="meta-item"><span>⭐</span> <span id="watchRating" class="rating"></span></span>
                        <span class="meta-item"><span>📅</span> <span id="watchYear"></span></span>
                        <span class="meta-item"><span>🎬</span> <span id="watchType"></span></span>
                        <span class="meta-item"><span>👁️</span> <span id="watchViews"></span></span>
                    </div>
                    <div id="watchGenres" class="watch-genres"></div>
                </div>
            </div>
            <div class="player-section">
                <div id="mainVideoPlayer" class="main-video-player"></div>
                <div class="episode-selector" id="episodeSelector"></div>
            </div>
            <div class="description-section">
                <h3 class="section-subtitle">Описание</h3>
                <p id="watchDescription" class="watch-description"></p>
            </div>
            <div class="related-section">
                <h3 class="section-subtitle">Связанные серии</h3>
                <div id="relatedEpisodes" class="related-episodes"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentOffset = 0;
        const limit = 20;

        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                if (!response.ok) throw new Error('Network response was not ok');
                return await response.json();
            } catch (error) {
                console.error('Fetch error:', error);
                throw error;
            }
        }

        function renderAnimeGrid(animeList, container) {
            if (!animeList || animeList.length === 0) {
                container.innerHTML = '<div class="error">Аниме не найдено</div>';
                return;
            }

            container.innerHTML = `
                <div class="anime-grid">
                    ${animeList.map(anime => {
                        // Normalize poster URL
                        const posterUrl = anime.poster?.medium || anime.poster?.big || anime.poster?.fullsize || '';
                        const normalizedPoster = posterUrl.startsWith('//') ? 'https:' + posterUrl : (posterUrl || 'https://via.placeholder.com/200x280');
                        
                        return `
                        <div class="anime-card" onclick="showAnimeDetails(${anime.anime_id})">
                            <img src="${normalizedPoster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/200x280'">
                            <div class="anime-card-info">
                                <div class="anime-card-title">${anime.title}</div>
                                <div class="anime-card-meta">
                                    <span>${anime.year || 'N/A'}</span>
                                    <span class="rating">⭐ ${anime.rating?.average?.toFixed(2) || 'N/A'}</span>
                                </div>
                            </div>
                        </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        async function loadHome() {
            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="loading">Загрузка...</div>';

            try {
                const [catalogData, scheduleData] = await Promise.all([
                    fetchAPI('/anime?limit=12'),
                    fetchAPI('/anime/schedule')
                ]);

                // API returns {response: [...]} directly, not {response: {data: [...]}}
                const animeList = Array.isArray(catalogData.response) ? catalogData.response : (catalogData.response?.data || []);
                const schedule = Array.isArray(scheduleData.response) ? scheduleData.response : (scheduleData.response?.data || []);

                main.innerHTML = `
                    <h2 class="section-title">🔥 Популярное сейчас</h2>
                    <div id="popularGrid"></div>
                    
                    <h2 class="section-title">📅 Онгоинги (Расписание)</h2>
                    <div id="scheduleGrid" class="anime-grid"></div>
                `;

                renderAnimeGrid(animeList, document.getElementById('popularGrid'));

                const scheduleGrid = document.getElementById('scheduleGrid');
                if (schedule && schedule.length > 0) {
                    scheduleGrid.innerHTML = `
                        <div class="anime-grid">
                            ${schedule.slice(0, 8).map(anime => `
                                <div class="anime-card" onclick="showAnimeDetails(${anime.anime_id})">
                                    <img src="${anime.poster?.medium || 'https://via.placeholder.com/200x280'}" alt="${anime.title}">
                                    <div class="anime-card-info">
                                        <div class="anime-card-title">${anime.title}</div>
                                        <div class="anime-card-meta">
                                            <span>Эпизодов: ${anime.episodes?.aired || 0}/${anime.episodes?.count || '?'}</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    scheduleGrid.innerHTML = '<div class="error">Нет данных о расписании</div>';
                }

                updateNavActive(0);
            } catch (error) {
                main.innerHTML = '<div class="error">Ошибка загрузки данных</div>';
            }
        }

        async function loadCatalog() {
            const main = document.getElementById('mainContent');
            currentOffset = 0;
            main.innerHTML = '<div class="loading">Загрузка каталога...</div>';

            try {
                const data = await fetchAPI(`/anime?limit=${limit}&offset=${currentOffset}`);
                // API returns {response: [...]} directly, not {response: {data: [...]}}
                const animeList = Array.isArray(data.response) ? data.response : (data.response?.data || []);

                main.innerHTML = `
                    <h2 class="section-title">📚 Каталог аниме</h2>
                    <div class="filters">
                        <select onchange="filterByGenre(this.value)">
                            <option value="">Все жанры</option>
                        </select>
                        <select onchange="filterByYear(this.value)">
                            <option value="">Все годы</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                            <option value="2022">2022</option>
                            <option value="2021">2021</option>
                        </select>
                    </div>
                    <div id="catalogGrid"></div>
                    <div style="text-align: center; margin-top: 30px;">
                        <button onclick="loadMore()" style="padding: 15px 40px; background: var(--primary-color); border: none; border-radius: 6px; color: #fff; font-size: 14px; cursor: pointer; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px;">Загрузить ещё</button>
                    </div>
                `;

                renderAnimeGrid(animeList, document.getElementById('catalogGrid'));
                loadGenres();
                updateNavActive(1);
            } catch (error) {
                main.innerHTML = '<div class="error">Ошибка загрузки каталога</div>';
            }
        }

        async function loadSchedule() {
            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="loading">Загрузка расписания...</div>';

            try {
                const data = await fetchAPI('/anime/schedule');
                // API returns {response: [...]} directly, not {response: {data: [...]}}
                const schedule = Array.isArray(data.response) ? data.response : (data.response?.data || []);

                main.innerHTML = `
                    <h2 class="section-title">📅 Расписание выхода эпизодов</h2>
                    <div id="scheduleGrid" class="anime-grid"></div>
                `;

                const scheduleGrid = document.getElementById('scheduleGrid');
                if (schedule && schedule.length > 0) {
                    scheduleGrid.innerHTML = `
                        <div class="anime-grid">
                            ${schedule.map(anime => {
                                const posterUrl = anime.poster?.medium || anime.poster?.big || anime.poster?.fullsize || '';
                                const normalizedPoster = posterUrl.startsWith('//') ? 'https:' + posterUrl : (posterUrl || 'https://via.placeholder.com/200x280');
                                return `
                                <div class="anime-card" onclick="showAnimeDetails(${anime.anime_id})">
                                    <img src="${normalizedPoster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/200x280'">
                                    <div class="anime-card-info">
                                        <div class="anime-card-title">${anime.title}</div>
                                        <div class="anime-card-meta">
                                            <span>Вышло: ${anime.episodes?.aired || 0}</span>
                                            <span>Всего: ${anime.episodes?.count || '?'}</span>
                                        </div>
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    `;
                } else {
                    scheduleGrid.innerHTML = '<div class="error">Нет данных о расписании</div>';
                }

                updateNavActive(2);
            } catch (error) {
                main.innerHTML = '<div class="error">Ошибка загрузки расписания</div>';
            }
        }

        async function loadVideos() {
            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="loading">Загрузка видео...</div>';

            try {
                const data = await fetchAPI('/bloggers/video?limit=20&category=all');
                const videos = data.response || [];

                main.innerHTML = `
                    <h2 class="section-title">🎬 Видео от блогеров</h2>
                    <div id="videosGrid" class="anime-grid"></div>
                `;

                const videosGrid = document.getElementById('videosGrid');
                if (videos && videos.length > 0) {
                    videosGrid.innerHTML = `
                        <div class="anime-grid">
                            ${videos.map(video => `
                                <div class="anime-card" onclick="showVideo('${video.iframe_url || ''}', '${video.title}')">
                                    <img src="${video.preview_image || 'https://via.placeholder.com/200x280'}" alt="${video.title}">
                                    <div class="anime-card-info">
                                        <div class="anime-card-title">${video.title}</div>
                                        <div class="anime-card-meta">
                                            <span>👁️ ${video.views || 0}</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    videosGrid.innerHTML = '<div class="error">Нет видео</div>';
                }

                updateNavActive(3);
            } catch (error) {
                main.innerHTML = '<div class="error">Ошибка загрузки видео</div>';
            }
        }

        async function loadGenres() {
            try {
                const data = await fetchAPI('/anime/genres');
                const genres = data.response?.genres || [];
                const select = document.querySelector('.filters select');
                
                genres.forEach(genre => {
                    const option = document.createElement('option');
                    option.value = genre.value;
                    option.textContent = genre.title;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading genres:', error);
            }
        }

        async function searchAnime() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="loading">Поиск...</div>';

            try {
                const data = await fetchAPI(`/anime?search=${encodeURIComponent(query)}&limit=20`);
                // API returns {response: [...]} directly, not {response: {data: [...]}}
                const animeList = Array.isArray(data.response) ? data.response : (data.response?.data || []);

                main.innerHTML = `
                    <h2 class="section-title">🔍 Результаты поиска: "${query}"</h2>
                    <div id="searchGrid"></div>
                `;

                renderAnimeGrid(animeList, document.getElementById('searchGrid'));
            } catch (error) {
                main.innerHTML = '<div class="error">Ошибка поиска</div>';
            }
        }

        let currentVideos = [];
        let currentPage = 'home';
        
        async function showAnimeDetails(id) {
            // Скрываем главный контент и показываем страницу просмотра
            document.getElementById('mainContent').style.display = 'none';
            const watchPage = document.getElementById('watchPage');
            watchPage.style.display = 'block';
            watchPage.innerHTML = '<div class="loading" style="padding: 100px;">Загрузка...</div>';
            
            try {
                const data = await fetchAPI(`/anime/${id}`);
                const anime = data.response;

                if (!anime) throw new Error('Anime not found');

                // Normalize poster URL
                const posterUrl = anime.poster?.huge || anime.poster?.big || anime.poster?.fullsize || '';
                const normalizedPoster = posterUrl.startsWith('//') ? 'https:' + posterUrl : (posterUrl || 'https://via.placeholder.com/280x400');
                
                document.getElementById('watchPoster').src = normalizedPoster;
                document.getElementById('watchPoster').onerror = function() { this.src = 'https://via.placeholder.com/280x400'; };
                document.getElementById('watchTitle').textContent = anime.title;
                document.getElementById('watchRating').textContent = anime.rating?.average?.toFixed(2) || 'N/A';
                document.getElementById('watchYear').textContent = anime.year || 'N/A';
                document.getElementById('watchType').textContent = anime.type?.name || 'N/A';
                document.getElementById('watchViews').textContent = (anime.views || 0).toLocaleString();
                
                const genresContainer = document.getElementById('watchGenres');
                if (anime.genres && anime.genres.length > 0) {
                    genresContainer.innerHTML = anime.genres.map(g => 
                        `<span class="genre-tag">${g.title}</span>`
                    ).join('');
                } else {
                    genresContainer.innerHTML = '';
                }

                document.getElementById('watchDescription').innerHTML = anime.description || 'Описание отсутствует';

                // Get videos from viewing_order or create from episodes
                let videos = [];
                if (anime.viewing_order && anime.viewing_order.length > 0) {
                    // Use viewing order to get related anime
                    videos = anime.viewing_order.map((item, index) => ({
                        iframe_url: `https://ru.yummyani.me/catalog/${item.anime_url}`,
                        title: item.title,
                        episode: index + 1,
                        data: {
                            dubbing: item.translates?.[0]?.title || 'Озвучка'
                        }
                    }));
                }
                
                // Store videos globally for easy access
                currentVideos = videos;

                // Render episode selector and player
                const episodeSelector = document.getElementById('episodeSelector');
                const relatedEpisodes = document.getElementById('relatedEpisodes');
                
                if (currentVideos.length > 0) {
                    // Episode selector buttons
                    episodeSelector.innerHTML = currentVideos.map((video, index) => 
                        `<button class="episode-btn ${index === 0 ? 'active' : ''}" 
                                onclick="playEpisode('${video.iframe_url}', ${index + 1}, this)">
                            Эпизод ${index + 1}
                        </button>`
                    ).join('');
                    
                    // Related episodes grid
                    relatedEpisodes.innerHTML = currentVideos.map((video, index) => `
                        <div class="related-episode-card ${index === 0 ? 'active' : ''}" 
                             onclick="playEpisode('${video.iframe_url}', ${index + 1}, null, this)">
                            <div class="related-episode-number">${index + 1}</div>
                            <div class="related-episode-title">${video.title || 'Эпизод ' + (index + 1)}</div>
                            <div class="related-episode-dubbing">${video.data?.dubbing || ''}</div>
                        </div>
                    `).join('');
                    
                    // Play first episode by default
                    playEpisode(currentVideos[0].iframe_url, 1);
                } else {
                    episodeSelector.innerHTML = '';
                    relatedEpisodes.innerHTML = '<div class="error" style="padding: 40px; text-align: center;">Для этого аниме нет доступных видео</div>';
                    document.getElementById('mainVideoPlayer').innerHTML = '<div class="error" style="display: flex; align-items: center; justify-content: center; height: 100%;">Видео недоступно</div>';
                }

            } catch (error) {
                console.error('Error loading anime details:', error);
                watchPage.innerHTML = '<div class="error" style="padding: 100px;">Ошибка загрузки информации об аниме</div>';
            }
        }
        
        function goBack() {
            document.getElementById('watchPage').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            // Stop video playback
            document.getElementById('mainVideoPlayer').innerHTML = '';
        }

        function playEpisode(url, episodeNumber, btnElement = null, cardElement = null) {
            const container = document.getElementById('mainVideoPlayer');
            
            // Update active button state
            if (btnElement) {
                document.querySelectorAll('.episode-btn').forEach(btn => btn.classList.remove('active'));
                btnElement.classList.add('active');
            }
            
            // Update active card state
            if (cardElement) {
                document.querySelectorAll('.related-episode-card').forEach(card => card.classList.remove('active'));
                cardElement.classList.add('active');
            }
            
            if (url) {
                container.innerHTML = `
                    <iframe src="${url}" frameborder="0" allowfullscreen allow="autoplay; fullscreen"></iframe>
                `;
            } else {
                container.innerHTML = '<div class="error">Видео недоступно</div>';
            }
        }

        function loadMore() {
            currentOffset += limit;
            loadCatalog();
        }

        function filterByGenre(genreId) {
            if (!genreId) {
                loadCatalog();
                return;
            }
            
            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="loading">Фильтрация...</div>';
            
            fetchAPI(`/anime?genre=${genreId}&limit=${limit}`).then(data => {
                // API returns {response: [...]} directly, not {response: {data: [...]}}
                const animeList = Array.isArray(data.response) ? data.response : (data.response?.data || []);
                main.innerHTML = `
                    <h2 class="section-title">Жанр: ${genreId}</h2>
                    <div id="filteredGrid"></div>
                `;
                renderAnimeGrid(animeList, document.getElementById('filteredGrid'));
            }).catch(() => {
                main.innerHTML = '<div class="error">Ошибка фильтрации</div>';
            });
        }

        function filterByYear(year) {
            if (!year) {
                loadCatalog();
                return;
            }
            
            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="loading">Фильтрация...</div>';
            
            fetchAPI(`/anime?year=${year}&limit=${limit}`).then(data => {
                // API returns {response: [...]} directly, not {response: {data: [...]}}
                const animeList = Array.isArray(data.response) ? data.response : (data.response?.data || []);
                main.innerHTML = `
                    <h2 class="section-title">Год: ${year}</h2>
                    <div id="filteredGrid"></div>
                `;
                renderAnimeGrid(animeList, document.getElementById('filteredGrid'));
            }).catch(() => {
                main.innerHTML = '<div class="error">Ошибка фильтрации</div>';
            });
        }

        function updateNavActive(index) {
            const navLinks = document.querySelectorAll('nav a');
            navLinks.forEach((link, i) => {
                link.classList.toggle('active', i === index);
            });
        }

        // Handle Enter key in search
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchAnime();
            });

            // Load home page
            loadHome();
        });
    </script>
</body>
</html>
